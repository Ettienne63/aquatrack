<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/custom.css">
    <title>Edit readings</title>
</head>

<body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container">
            <a class="navbar-brand" href="index.html">AquaLog</a>
            <div class="navbar-nav ms-auto">
                <a href="index.html" class="nav-link">Dashboard</a>
                <a href="add-reading.html" class="nav-link">Add Reading</a>
                <a href="profile.html" class="nav-link">Profile</a>
            </div>
        </div>
    </nav>
    <main class="container py-4">
        <section class="mb-4">
            <h1> Edit Readings For Your Tank</h1>
            <p class="text-muted">
                Edit your tank readings.
            </p>
        </section>
        <section class="mb-4">
            <div class="card">
                <div class="card-body">
                    <h2 class="h5 card-title">Enter Values To Be Stored</h2>
                    <form action="" id="reading-form">
                        <div class="mb-3">
                            <label for="temperature" class="form-label">
                                Temperature (°C)
                            </label>
                            <input type="number" class="form-control" id="temperature" step="0.1" placeholder="25.5">
                        </div>
                        <div class="mb-3">
                            <label for="ph" class="form-label">
                                pH
                            </label>
                            <input type="number" class="form-control" id="ph" step="0.1" placeholder="7.0">
                        </div>
                        <div class="mb-3">
                            <label for="ammonia" class="form-label">
                                Ammonia (ppm)
                            </label>
                            <input type="number" class="form-control" id="ammonia" step="0.1" placeholder="0.0">
                        </div>
                        <div class="mb-3">
                            <label for="nitrite" class="form-label">
                                Nitrite (ppm)
                            </label>
                            <input type="number" class="form-control" id="nitrite" step="0.1" placeholder="0.0">
                        </div>
                        <div class="mb-3">
                            <label for="nitrate" class="form-label">
                                Nitrate (ppm)
                            </label>
                            <input type="number" class="form-control" id="nitrate" step="0.1" placeholder="10">
                        </div>
                        <div class="mb-3">
                            <label for="recordedDate" class="form-label">Date recorded</label>
                            <input type="date" class="form-control" name="recordedDate" id="recordedDate">
                        </div>
                        <div class="mb-3">
                            <label for="notes" class="form-label">Notes</label>
                            <textarea class="form-control" name="notes" id="notes" rows="4"
                                placeholder="Tank observations..."></textarea>
                        </div>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary" id="save-reading-btn">Save Reading</button>
                        </div>
                    </form>
                </div>
            </div>
        </section>

    </main>
    <script src="js/config/config.js"></script>
    <script src="js/storage/storage.js"></script>
    <script src="js/validation/reading-validation.js"></script>
    <script src="js/pages/edit-reading.js"></script>
</body>

</html>
